name: TrueNAS Catalog Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      bump:
        description: "Catalog-Versions-Bump"
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write

concurrency:
  group: truenas-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Oikos
        uses: actions/checkout@v4
        with:
          ref: main          # nicht den Tag-Commit (detached HEAD) — sonst kein sauberer Push auf main
          fetch-depth: 0

      - name: Checkout TrueNAS fork
        uses: actions/checkout@v4
        with:
          repository: ulsklyc/apps
          ref: community/oikos
          token: ${{ secrets.TRUENAS_FORK_TOKEN }}
          path: truenas-apps
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate TrueNAS files
        id: gen
        run: |
          BUMP="${{ github.event.inputs.bump || 'patch' }}"
          node tools/truenas/generate.mjs --bump="$BUMP" \
            --out "$GITHUB_WORKSPACE/truenas-apps/ix-dev/community/oikos"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          echo "catalog=$(node -p "require('./deploy/truenas/catalog-version.json').version")" >> "$GITHUB_OUTPUT"

      - name: Commit catalog-version.json back to Oikos
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- deploy/truenas/catalog-version.json; then
            git add deploy/truenas/catalog-version.json
            git commit -m "chore(truenas): bump catalog version to ${{ steps.gen.outputs.catalog }} [skip ci]"
            git push origin HEAD:main
          fi

      - name: Push fork branch
        id: push
        working-directory: truenas-apps
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Keine Änderungen — nichts zu veröffentlichen."
            exit 0
          fi
          git add ix-dev/community/oikos
          git commit -m "fix(oikos): bump to v${{ steps.gen.outputs.version }}"
          git push origin community/oikos
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open or update PR
        if: steps.push.outputs.changed == 'true'
        working-directory: truenas-apps
        env:
          GH_TOKEN: ${{ secrets.TRUENAS_FORK_TOKEN }}
        run: |
          existing=$(gh pr list --repo truenas/apps --head community/oikos \
            --json number --jq '.[0].number' || true)
          if [ -z "$existing" ]; then
            gh pr create --repo truenas/apps \
              --base master --head ulsklyc:community/oikos \
              --title "Update Oikos to v${{ steps.gen.outputs.version }}" \
              --body "Bumps Oikos to v${{ steps.gen.outputs.version }} (catalog ${{ steps.gen.outputs.catalog }}). Generated by the Oikos truenas-publish workflow."
          else
            echo "PR #$existing existiert bereits — durch den Push aktualisiert."
          fi
